{% load static %}
<!-- Top Navigation -->
<header class="sticky top-0 z-50 w-full border-b border-primary/10 bg-white/80 backdrop-blur-md">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <!-- Brand -->
        <a href="/" class="flex items-center gap-2 no-underline">
            <div class="text-primary">
                <span class="material-symbols-outlined text-3xl">insights</span>
            </div>
            <h2 class="text-xl font-extrabold tracking-tight text-primary m-0">StockPro</h2>
        </a>
        
        <!-- Center Links -->
        <nav class="hidden md:flex items-center gap-8">
            <a class="text-sm font-semibold text-slate-700 hover:text-primary transition-colors no-underline" href="/market/">Market Analysis</a>
            <a class="text-sm font-semibold text-slate-700 hover:text-primary transition-colors no-underline" href="/calls/">Predictions</a>
        </nav>
        
        <!-- Actions -->
        <div class="flex items-center gap-4">
            {% if not user.is_authenticated %}
                <a href="{% url 'authentication:login' %}" class="hidden sm:block text-sm font-bold text-primary px-4 py-2 hover:bg-primary/5 rounded-lg transition-all no-underline">Login</a>
                <a href="{% url 'authentication:register' %}" class="bg-primary text-white text-sm font-bold px-5 py-2.5 rounded-lg hover:shadow-lg transition-all no-underline">Start Free</a>
            {% else %}
                <a href="{% url 'dashboard:dashboard' %}" class="bg-primary text-white text-sm font-bold px-5 py-2.5 rounded-lg hover:shadow-lg transition-all no-underline">Dashboard</a>
            {% endif %}
        </div>
    </div>
</header>
