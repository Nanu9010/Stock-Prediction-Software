{% load static %}
<!-- Admin Top Header -->
<header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md sticky top-0 z-10 px-4 md:px-8 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-4 flex-1">
        <!-- Mobile Menu Toggle -->
        <button id="mobile-menu-btn" class="md:hidden text-slate-500 hover:text-slate-700">
            <span class="material-symbols-outlined">menu</span>
        </button>
        
        <!-- Search Bar -->
        <div class="hidden md:block relative w-full max-w-md">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
            <input type="text" placeholder="Search system metrics..." 
                   class="w-full bg-slate-100 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all text-slate-700">
        </div>
    </div>
    
    <div class="flex items-center gap-2 md:gap-4">
        <!-- Notifications -->
        <button class="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors">
            <span class="material-symbols-outlined !text-[20px]">notifications</span>
            <span class="absolute top-2 right-2 size-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>
        
        <!-- Help -->
        <button class="hidden sm:block p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors">
            <span class="material-symbols-outlined !text-[20px]">help</span>
        </button>
        
        <div class="hidden sm:block h-6 w-px bg-slate-200 mx-1"></div>
        
        <!-- System Status -->
        <div class="hidden lg:flex items-center gap-2">
            <span class="text-xs font-medium text-slate-600">System Status:</span>
            <span class="flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-green-100 text-green-600 text-[10px] font-bold">
                <span class="size-1.5 bg-green-500 rounded-full"></span>
                OPERATIONAL
            </span>
        </div>
        
        <!-- User Profile -->
        <a href="{% url 'authentication:profile' %}" class="flex items-center gap-2 ml-2 p-1 pr-2 rounded-full hover:bg-slate-100 transition-colors no-underline group">
            <div class="size-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-sm">
                {{ user.first_name|default:user.email|make_list|first|upper }}
            </div>
            <div class="hidden md:flex flex-col">
                <span class="text-xs font-bold text-slate-700 group-hover:text-primary transition-colors leading-tight">{{ user.get_full_name|default:user.email }}</span>
                <span class="text-[10px] text-slate-500 font-medium">System Admin</span>
            </div>
        </a>
    </div>
</header>
