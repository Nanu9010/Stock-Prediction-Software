{% load static %}
{# ─── Live Market Ticker ──────────────────────────────────────────────────── #}
<style>
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}
.animate-scroll {
    display: flex;
    width: max-content;
    animation: scroll 30s linear infinite;
}
.animate-scroll:hover {
    animation-play-state: paused;
}
@keyframes blink {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
}
.ticker-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #10b981; /* emerald-500 */
    margin-right: 4px;
    animation: blink 2s ease-in-out infinite;
}
</style>

<div class="relative w-full bg-primary/5 border-b border-primary/10 py-2 overflow-hidden whitespace-nowrap text-sm font-display flex items-center">
    <!-- Fade Edges -->
    <div class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-slate-50 to-transparent z-10 pointer-events-none"></div>
    <div class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-slate-50 to-transparent z-10 pointer-events-none"></div>

    <div class="animate-scroll gap-8 px-4" id="tickerTrack">
        <!-- Static Placeholder during Initial Load -->
        <div class="flex items-center gap-2 px-4 shadow-sm py-1 bg-white rounded-md border border-slate-100">
            <span class="font-bold text-slate-700">NIFTY 50:</span> 
            <span class="text-slate-500">Loading…</span>
        </div>
        <div class="flex items-center gap-2 px-4 shadow-sm py-1 bg-white rounded-md border border-slate-100">
            <span class="font-bold text-slate-700">SENSEX:</span> 
            <span class="text-slate-500">Loading…</span>
        </div>
        <div class="flex items-center gap-2 px-4 shadow-sm py-1 bg-white rounded-md border border-slate-100">
            <span class="font-bold text-slate-700">BANKNIFTY:</span> 
            <span class="text-slate-500">Loading…</span>
        </div>
    </div>
    
    <div class="absolute right-4 z-20 bg-slate-50 px-2 py-0.5 rounded text-[10px] font-bold text-slate-500 flex items-center shadow-sm border border-slate-200" id="tickerStatus">
        <span class="ticker-dot"></span>LIVE
    </div>
</div>

<script>
(function () {
    const TICKER_URL = '/api/market/data/?type=ticker';
    const POLL_MS    = 60_000;   // refresh every 60s
    const track      = document.getElementById('tickerTrack');
    const statusEl   = document.getElementById('tickerStatus');
    let   lastFetch  = 0;

    function buildItems(results) {
        if (!results || !results.length) return '';
        return results.map(item => {
            const dir = item.direction;
            let cls = 'text-slate-600';
            let arrow = '';
            
            if (dir === 'up') {
                cls = 'text-green-600';
                arrow = '▲';
            } else if (dir === 'down') {
                cls = 'text-red-600';
                arrow = '▼';
            }

            return `
                <div class="flex items-center gap-2 px-4 bg-white rounded-md border border-slate-100 shadow-sm py-1">
                    <span class="font-bold text-slate-700">${item.label}:</span> 
                    <span class="${cls} font-medium">${item.price} ${arrow} ${item.change} (${item.change_pct})</span>
                </div>`;
        }).join('');
    }

    function setStatus(live) {
        if (!statusEl) return;
        const now = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
        statusEl.innerHTML = live
            ? `<span class="ticker-dot"></span>LIVE · ${now}`
            : `Updated ${now}`;
    }

    function injectAndDuplicate(html) {
        // Duplicate for seamless loop
        track.innerHTML = html + html;
        // Reset animation to prevent jumping
        track.style.animation = 'none';
        track.offsetHeight; // force reflow
        track.style.animation = '';
    }

    async function fetchTicker() {
        try {
            const res  = await fetch(TICKER_URL, {credentials: 'same-origin'});
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            
            // Expected format: data.data or data.results (adjusting based on unified API)
            const results = data.data || data.results || [];
            
            if (results.length > 0) {
                const html = buildItems(results);
                injectAndDuplicate(html);
                setStatus(true); // Always treat as live for ticker
                lastFetch = Date.now();
            }
        } catch (e) {
            console.error('Ticker fetch error:', e);
            setStatus(false); 
        }
    }

    // Initial fetch
    fetchTicker();

    // Poll every 60s
    setInterval(() => {
        if (Date.now() - lastFetch >= POLL_MS - 1000) fetchTicker();
    }, POLL_MS);
})();
</script>
