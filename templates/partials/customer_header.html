<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
    <div class="flex items-center gap-4 flex-1">
        <!-- Mobile Menu Button -->
        <button id="mobile-menu-btn" class="md:hidden text-slate-500 hover:text-slate-700">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <!-- Global Search -->
        <div class="hidden md:flex relative w-96">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
            <input type="text" placeholder="Search stocks, indices, or research calls..." 
                   class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-colors">
        </div>
    </div>

    <div class="flex items-center gap-4">
        <!-- Notification Bell -->
        <button class="relative p-2 text-slate-500 hover:text-slate-700 hover:bg-slate-100 rounded-full transition-colors">
            <span class="material-symbols-outlined">notifications</span>
            {% if unread_notifications %}
            <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
            {% endif %}
        </button>
        <!-- User Profile & Admin Link -->
        <div class="flex items-center gap-3">
            {% if user.is_staff %}
            <a href="{% url 'admin_panel:dashboard' %}" class="hidden md:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-50 text-amber-700 border border-amber-200 hover:bg-amber-100 transition-colors no-underline text-xs font-bold">
                <span class="material-symbols-outlined text-sm">admin_panel_settings</span>
                Admin
            </a>
            {% endif %}
            
            <div class="relative group">
                <button class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-semibold text-sm">
                        {{ user.first_name|default:user.email|make_list|first|upper }}
                    </div>
                </button>
                
                <!-- Simple Dropdown on Hover -->
                <div class="absolute right-0 top-full mt-2 w-48 bg-white border border-slate-200 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 py-2">
                    <a href="{% url 'authentication:profile' %}" class="flex items-center gap-3 px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 no-underline">
                        <span class="material-symbols-outlined text-lg">person</span>
                        Profile
                    </a>
                    <hr class="my-1 border-slate-100">
                    <a href="{% url 'authentication:logout' %}" class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50 no-underline">
                        <span class="material-symbols-outlined text-lg">logout</span>
                        Sign Out
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>
