{% extends 'base.html' %}
{% load static %}

{% block title %}Access Recovery - Stock Research Platform{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 bg-slate-50">
    <div class="w-full max-w-md bg-white p-10 rounded-[40px] border border-slate-200 shadow-sm">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-slate-200">
                <span class="material-symbols-outlined text-[32px]">lock_reset</span>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-2">Access Recovery</h1>
            <p class="text-slate-500 font-medium text-sm">Synchronize your account credentials safely.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="email" class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 leading-none">Registered Email Identifier</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">alternate_email</span>
                    <input type="email" id="email" name="email" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-slate-900 font-bold focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-300"
                           placeholder="j.doe@protocol.com">
                </div>
            </div>

            <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-sm hover:bg-slate-800 transition-all shadow-xl shadow-slate-100 flex items-center justify-center gap-2">
                Dispatch Reset Link
                <span class="material-symbols-outlined text-[18px]">send</span>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-100 text-center">
            <a href="{% url 'authentication:login' %}" class="text-xs font-black text-slate-400 uppercase tracking-widest hover:text-slate-900 transition-colors no-underline flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Recall Credentials? Log In
            </a>
        </div>
    </div>
</div>
{% endblock %}
