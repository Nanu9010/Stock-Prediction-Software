version: '3.9'

services:

  web:
    build: .
    container_name: django_app
    command: sh -c "python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PASSWORD=stockpassword
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_CACHE_LOCATION=redis://redis:6379/1

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: stock_research_platform
      MYSQL_ROOT_PASSWORD: stockpassword
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis_cache
    ports:
      - "6380:6379"

  celery:
    build: .
    container_name: celery_worker
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      redis:
        condition: service_started
      web:
        condition: service_started
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PASSWORD=stockpassword
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_CACHE_LOCATION=redis://redis:6379/1

  celery-beat:
    build: .
    container_name: celery_beat
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_started
      web:
        condition: service_started
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PASSWORD=stockpassword
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_CACHE_LOCATION=redis://redis:6379/1

volumes:
  mysql_data:
